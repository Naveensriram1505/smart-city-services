<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="theme-color" content="#0B2B6B" />
  <meta name="description" content="Smart City Services — every essential city service, one app." />
  <title>Smart City Services</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- ===================== SPLASH ===================== -->
  <div id="splash-screen" class="splash">
    <div class="splash-orb splash-orb-1"></div>
    <div class="splash-orb splash-orb-2"></div>
    <div class="splash-content">
      <div class="splash-ring"><i data-lucide="building-2"></i></div>
      <h1 class="splash-title">Smart City Services</h1>
      <p class="splash-sub">Your city, in your pocket</p>
    </div>
    <div class="splash-loader"><div class="splash-loader-bar"></div></div>
  </div>

  <!-- ===================== AUTH ===================== -->
  <div id="auth-screen" class="screen hidden">
    <div id="auth-root"></div>
  </div>

  <!-- ===================== APP SHELL ===================== -->
  <div id="app-shell" class="hidden">
    <header class="top-bar" id="top-bar">
      <div class="top-bar-left">
        <button class="icon-btn hidden" id="back-btn" onclick="app.goBack()" aria-label="Go back">
          <i data-lucide="arrow-left"></i>
        </button>
        <div class="brand" id="brand">
          <div class="brand-mark"><i data-lucide="building-2"></i></div>
          <span class="brand-name">SmartCity</span>
        </div>
        <h2 class="page-title" id="page-title"></h2>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
        <button class="icon-btn notif" id="notif-btn" aria-label="Notifications" onclick="app.navigate('news')">
          <i data-lucide="bell"></i><span class="notif-dot"></span>
        </button>
        <div class="avatar" id="avatar-btn" onclick="app.navigate('profile')"><span id="avatar-initials">SC</span></div>
      </div>
    </header>

    <main class="main-content" id="main-content"></main>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" id="nav-home" onclick="app.navigate('home')"><i data-lucide="home"></i><span>Home</span></button>
      <button class="nav-item" id="nav-chatbot" onclick="app.navigate('chatbot')"><i data-lucide="sparkles"></i><span>AI Chat</span></button>
      <button class="nav-item" id="nav-complaint" onclick="app.navigate('complaintList')"><i data-lucide="clipboard-list"></i><span>Complaints</span></button>
      <button class="nav-item" id="nav-emergency" onclick="app.navigate('emergency')"><i data-lucide="siren"></i><span>Emergency</span></button>
      <button class="nav-item" id="nav-profile" onclick="app.navigate('profile')"><i data-lucide="user"></i><span>Profile</span></button>
    </nav>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Firebase (compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/firebase-config.js"></script>

  <!-- App JS -->
  <script src="js/pages/auth.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/chatbot.js"></script>
  <script src="js/pages/complaint.js"></script>
  <script src="js/pages/waste.js"></script>
  <script src="js/pages/parking.js"></script>
  <script src="js/pages/transport.js"></script>
  <script src="js/pages/traffic.js"></script>
  <script src="js/pages/emergency.js"></script>
  <script src="js/pages/nearby.js"></script>
  <script src="js/pages/news.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
